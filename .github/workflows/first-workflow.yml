name: First workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

if: false

# This permission block is CRITICAL so the runner can post PR comments
permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest] # Using Ubuntu for the PR commenter step
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        id: run_tests
        env:
          PYTHONPATH: src
        run: pytest src/addition.py

      # 🟢 This posts a comment ONLY if all previous steps succeeded
      - name: Comment PR Success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Pytest Successful!** All tests passed smoothly on Python ${{ matrix.python-version }}.'
            })

      # 🔴 This posts a comment ONLY if the test step failed
      - name: Comment PR Failure
        if: failure() && steps.run_tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Pytest Failed!** Please check the GitHub Actions logs to fix the broken tests on Python ${{ matrix.python-version }}.'
            })
