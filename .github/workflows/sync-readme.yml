name: Sync README Checklist with Issues

on:
  issues:
    types: [opened, closed, reopened]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # --- TRIGGER 1: IF AN ISSUE IS NEWLY CREATED ---
      - name: Handle Newly Opened Issue
        if: github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          REPO="${{ github.repository }}"
          
          # Fetch issue details using GitHub CLI to see if it has a parent issue
          PARENT_DATA=$(gh api repos/$REPO/issues/$ISSUE_NUM --jq '.sub_issues_summary // empty')
          
          # Check if a parent exists. If yes, add a tab indentation (\t) for a sub-issue look
          if [ -n "$PARENT_DATA" ]; then
            NEW_LINE="  - [ ] Sub-Task: ${ISSUE_TITLE} <!-- id: #${ISSUE_NUM} -->"
          else
            NEW_LINE="- [ ] ${ISSUE_TITLE} <!-- id: #${ISSUE_NUM} -->"
          fi
          
          # Insert the line right above our target tracking comment
          sed -i "s|<!-- INSERT_NEW_TASKS_HERE -->|${NEW_LINE}\n<!-- INSERT_NEW_TASKS_HERE -->|g" README.md


      # --- TRIGGER 2: IF AN ISSUE IS CLOSED ---
      - name: Handle Closed Issue
        if: github.event.action == 'closed'
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          sed -i -E "s/- \[[ bB]?\] (.*)<!-- id: #${ISSUE_NUM} -->/- [x] ~~\1~~ <!-- id: #${ISSUE_NUM} -->/" README.md

      # --- TRIGGER 3: IF A CLOSED ISSUE IS REOPENED ---
      - name: Handle Reopened Issue
        if: github.event.action == 'reopened'
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          sed -i -E "s/- \[[xX]\] ~~(.*)~~ <!-- id: #${ISSUE_NUM} -->/- [ ] \1 <!-- id: #${ISSUE_NUM} -->/" README.md

      # --- COMMIT THE AUTOMATED EDITS BACK TO GIT ---
      - name: Commit and Push README Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update tasklist for Issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push
